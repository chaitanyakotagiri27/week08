name: Frontend CI - Build & Push Image

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend_ci.yml'

# Use either Secrets or Variables (works with both).
env:
  ACR_NAME: ${{ secrets.ACR_NAME != '' && secrets.ACR_NAME || vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER != '' && secrets.ACR_LOGIN_SERVER || vars.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}-${{ github.run_id }}

jobs:
  build_and_push_frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # IMPORTANT: --name expects the short registry name (no .azurecr.io)
      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Frontend Image
        run: |
          # Build
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/frontend_service:latest \
            -t ${{ env.ACR_LOGIN_SERVER }}/frontend_service:${{ env.IMAGE_TAG }} \
            ./frontend

          # Push underscore repo
          docker push ${{ env.ACR_LOGIN_SERVER }}/frontend_service:latest
          docker push ${{ env.ACR_LOGIN_SERVER }}/frontend_service:${{ env.IMAGE_TAG }}

          # Also push a hyphen alias (some manifests use this)
          docker tag  ${{ env.ACR_LOGIN_SERVER }}/frontend_service:latest \
                      ${{ env.ACR_LOGIN_SERVER }}/frontend-service:latest
          docker push ${{ env.ACR_LOGIN_SERVER }}/frontend-service:latest

      - name: Logout from Azure
        if: always()
        run: az logout
