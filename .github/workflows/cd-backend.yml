name: CD - Deploy Backend to AKS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "dev or prod"
        required: true
        default: "dev"

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AKS_RG: ${{ secrets.AKS_RG }}
  AKS_CLUSTER: ${{ secrets.AKS_CLUSTER }}

jobs:
  deploy_backend:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login -n "$ACR_NAME"

      - name: Set kubectl context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Apply product & order services (use latest)
        run: |
          sed -i "s#image: .*/product_service:.*#image: $ACR_LOGIN_SERVER/product_service:latest#g" k8s/product-service.yaml
          sed -i "s#image: .*/order_service:.*#image: $ACR_LOGIN_SERVER/order_service:latest#g"   k8s/order-service.yaml
          kubectl apply -f k8s/product-service.yaml
          kubectl apply -f k8s/order-service.yaml

      - name: Wait for rollouts
        run: |
          kubectl rollout status deploy/product-service-w08e1 --timeout=180s
          kubectl rollout status deploy/order-service-w08e1   --timeout=180s

      - name: Logout Azure
        if: always()
        run: az logout
