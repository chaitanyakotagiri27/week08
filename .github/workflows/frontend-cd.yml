# add (or ensure) these two repo secrets:
# ACR_NAME = sit722w08ck6111
# ACR_LOGIN_SERVER = sit722w08ck6111.azurecr.io

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: az acr login --name "$ACR_NAME"

      - name: Inject Backend IPs into Frontend main.js
        run: |
          sed -i "s|_PRODUCT_API_URL_|${{ inputs.product_api_ip }}|g" frontend/main.js
          sed -i "s|_ORDER_API_URL_|${{ inputs.order_api_ip }}|g"   frontend/main.js

      - name: Build and Push Frontend Image
        env:
          REG: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          docker build -t $REG/frontend_service:latest ./frontend
          docker push $REG/frontend_service:latest

      - name: Set Kubernetes context (get AKS credentials)
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ inputs.aks_resource_group }}
          cluster-name: ${{ inputs.aks_cluster_name }}

      - name: Deploy Frontend to AKS
        run: kubectl apply -f k8s/frontend.yaml
